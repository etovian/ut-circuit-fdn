@if (congregation(); as church) {
<div class="church-container">
  <a routerLink="/utah-circuit" class="home-button" title="Back to Circuit Hub">
    <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor">
      <path d="M240-200h120v-240h240v240h120v-440L480-740 240-440v440Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z"/>
    </svg>
  </a>

  <app-congregation-hero [church]="church"></app-congregation-hero>

  <nav class="subtle-tabs">
    <button (click)="setActiveTab('events')" [class.active]="activeTab() === 'events'">Events</button>
    <button (click)="setActiveTab('about')" [class.active]="activeTab() === 'about'">About</button>
    <button (click)="setActiveTab('location')" [class.active]="activeTab() === 'location'">Location</button>
    <button (click)="setActiveTab('leadership')" [class.active]="activeTab() === 'leadership'">Leadership</button>
    <button (click)="setActiveTab('links')" [class.active]="activeTab() === 'links'">Resources</button>
  </nav>

  <main class="content-wrapper">
    <div class="tab-content">
      @if (activeTab() === 'about') {
        <app-congregation-about @tabAnimation [church]="church"></app-congregation-about>
      }

      @if (activeTab() === 'events') {
        <app-congregation-events @tabAnimation 
          [events]="scheduledEvents()" 
          [churchName]="church.name">
        </app-congregation-events>
      }

      @if (activeTab() === 'location') {
        <app-congregation-location @tabAnimation [church]="church"></app-congregation-location>
      }

      @if (activeTab() === 'leadership') {
        <app-congregation-leadership @tabAnimation [church]="church"></app-congregation-leadership>
      }

      @if (activeTab() === 'links') {
        <app-congregation-links @tabAnimation [church]="church"></app-congregation-links>
      }
    </div>
  </main>
</div>
} @else {
  <div class="loading">Loading congregation details...</div>
}
