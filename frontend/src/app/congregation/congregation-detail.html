@if (congregation(); as church) {
<div class="church-container">
  <app-congregation-hero [church]="church"></app-congregation-hero>

  <main class="content-wrapper">
    <app-congregation-events 
      [events]="scheduledEvents()" 
      [churchName]="church.name">
    </app-congregation-events>

    <div class="horizontal-divider"></div>

    <app-congregation-about [church]="church"></app-congregation-about>

    <div class="horizontal-divider"></div>

    <app-congregation-location [church]="church"></app-congregation-location>

    <div class="horizontal-divider"></div>

    <app-congregation-links [church]="church"></app-congregation-links>

    <app-congregation-leadership [church]="church"></app-congregation-leadership>
  </main>

  <footer class="church-footer">
    <a routerLink="/utah-circuit" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" height="18" viewBox="0 -960 960 960" width="18" fill="currentColor">
        <path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/>
      </svg>
      Back to Circuit Hub
    </a>
  </footer>
</div>
} @else {
  <div class="loading">Loading congregation details...</div>
}
