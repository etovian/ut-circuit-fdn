<div class="person-form">
  <div class="tabs-header">
    <button type="button" class="tab-btn" [class.active]="activeTab() === 'name-position'" (click)="setActiveTab('name-position')">Name & Position</button>
    <button type="button" class="tab-btn" [class.active]="activeTab() === 'biographical'" (click)="setActiveTab('biographical')">Biographical Info</button>
    <button type="button" class="tab-btn" [class.active]="activeTab() === 'contact'" (click)="setActiveTab('contact')">Contact Information</button>
  </div>

  <div class="tabs-content">
    @if (activeTab() === 'name-position') {
      <div class="tab-pane">
        <div class="form-row">
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" [ngModel]="formData().title" (ngModelChange)="updateField('title', $event)" placeholder="e.g. Rev., Dr.">
          </div>
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" [ngModel]="formData().firstName" (ngModelChange)="updateField('firstName', $event)" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="middleName">Middle Name</label>
            <input type="text" id="middleName" [ngModel]="formData().middleName" (ngModelChange)="updateField('middleName', $event)">
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" [ngModel]="formData().lastName" (ngModelChange)="updateField('lastName', $event)" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="suffix">Suffix</label>
            <input type="text" id="suffix" [ngModel]="formData().suffix" (ngModelChange)="updateField('suffix', $event)" placeholder="e.g. Jr., III">
          </div>
          @if (congregationName()) {
            <div class="form-group">
              <label for="position">Position at {{ congregationName() }}</label>
              <input
                type="text"
                id="position"
                [ngModel]="formDataPosition()"
                (ngModelChange)="updatePosition($event)"
                placeholder="e.g. Pastor, Secretary, Board Member"
              >
            </div>
          }
        </div>
      </div>
    }

    @if (activeTab() === 'biographical') {
      <div class="tab-pane">
        <div class="form-group">
          <label for="dateOfBirth">Date of Birth</label>
          <input type="date" id="dateOfBirth" [ngModel]="formData().dateOfBirth" (ngModelChange)="updateField('dateOfBirth', $event)">
        </div>

        <div class="form-group">
          <label for="photoFileName">Photo File Name</label>
          <input type="text" id="photoFileName" [ngModel]="formData().photoFileName" (ngModelChange)="updateField('photoFileName', $event)" placeholder="e.g. pastor-smith.webp">
        </div>

        <div class="form-group">
          <label for="biography">Biography</label>
          <textarea id="biography" [ngModel]="formData().biography" (ngModelChange)="updateField('biography', $event)" rows="8"></textarea>
        </div>
      </div>
    }

    @if (activeTab() === 'contact') {
      <div class="tab-pane">
        <app-person-contact-info-admin
          [contactInfos]="formData().contactInfos || []"
        ></app-person-contact-info-admin>
      </div>
    }
  </div>

  <div class="actions">
    <button type="button" class="secondary" (click)="onCancel()">Cancel</button>
    <button type="button" class="primary" (click)="onSave()">Save Person</button>
  </div>
</div>
