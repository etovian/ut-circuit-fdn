<div class="contact-info-admin">
  <h3 class="field-label">Contact Information</h3>
  
  <div class="contact-list">
    @for (info of contactInfos(); track $index) {
      <div class="contact-item">
        <select [(ngModel)]="info.contactInfoType" class="type-select">
          <option value="PHONE_NUMBER">Phone</option>
          <option value="EMAIL">Email</option>
        </select>
        <input type="text" [(ngModel)]="info.contactValue" placeholder="Value" class="value-input">
        <button class="btn icon delete" (click)="removeContact(info)" title="Remove">✕</button>
      </div>
    } @empty {
      <div class="empty-state">No contact information added.</div>
    }
  </div>

  <button class="btn secondary small add-btn" (click)="addContact()">+ Add Contact Info</button>
</div>
