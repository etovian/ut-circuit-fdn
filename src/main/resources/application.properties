server.port=8080
spring.application.name=ut-circuit-fdn
management.endpoints.web.exposure.include=health,info,actuator

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/ut_circuit
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# External APIs
google.maps.api-key=${GOOGLE_MAPS_API_KEY:}
google.maps.base-url=https://maps.googleapis.com/maps/api

# Liquibase Configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true
